# docker-compose.yml
# Desarrollo local de smwhr — Postgres + PostGIS + Redis
# Útil si Supabase está intermitente o quieres trabajar offline

version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: smwhr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smwhr
      POSTGRES_USER: smwhr
      POSTGRES_PASSWORD: smwhr_dev_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smwhr -d smwhr']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smwhr-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO como mock de S3/Supabase Storage para testing local
  minio:
    image: minio/minio:latest
    container_name: smwhr-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'

volumes:
  postgres_data:
  redis_data:
  minio_data:
